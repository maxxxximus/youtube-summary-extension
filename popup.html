<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 280px;
      background: #0f0f0f;
      color: #fff;
      padding: 16px;
    }

    h2 { font-size: 14px; font-weight: 600; margin-bottom: 14px; color: #fff; }

    .btn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover   { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-chatgpt { background: #10a37f; color: #fff; }

    #status {
      font-size: 12px;
      color: #aaa;
      margin-top: 10px;
      text-align: center;
      min-height: 18px;
    }
    #status.error   { color: #ff6b6b; }
    #status.success { color: #10a37f; }

    .loader {
      display: inline-block;
      width: 11px; height: 11px;
      border: 2px solid #555;
      border-top-color: #10a37f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 5px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h2>🎬 YouTube → ChatGPT Summary</h2>
  <button class="btn btn-chatgpt" id="btnSummarize">✨ Get Summary Prompt</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
