<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 320px;
      background: #0f0f0f;
      color: #fff;
      padding: 16px;
    }

    h2 { font-size: 14px; font-weight: 600; margin-bottom: 14px; color: #fff; }

    .btn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover   { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-chatgpt { background: #10a37f; color: #fff; }

    #status {
      font-size: 12px;
      color: #aaa;
      margin-top: 10px;
      text-align: center;
      min-height: 18px;
    }
    #status.error   { color: #ff6b6b; }
    #status.success { color: #10a37f; }

    .loader {
      display: inline-block;
      width: 11px; height: 11px;
      border: 2px solid #555;
      border-top-color: #10a37f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 5px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* History */
    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 18px;
      margin-bottom: 8px;
    }
    .history-header span {
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .history-clear {
      font-size: 10px;
      color: #555;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
    }
    .history-clear:hover { color: #ff6b6b; }

    #historyList { display: flex; flex-direction: column; gap: 6px; }

    .history-item {
      background: #1a1a1a;
      border-radius: 7px;
      padding: 9px 10px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .history-item-info { flex: 1; min-width: 0; }
    .history-title {
      font-size: 12px;
      color: #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-date {
      font-size: 10px;
      color: #555;
      margin-top: 2px;
    }
    .history-copy {
      flex-shrink: 0;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 5px;
      border: 1px solid #333;
      background: #222;
      color: #aaa;
      cursor: pointer;
      transition: all 0.15s;
    }
    .history-copy:hover { background: #10a37f; color: #fff; border-color: #10a37f; }
    .history-copy.copied { background: #10a37f; color: #fff; border-color: #10a37f; }

    .history-empty {
      font-size: 11px;
      color: #444;
      text-align: center;
      padding: 8px 0;
    }
  </style>
</head>
<body>
  <h2>🎬 YouTube → ChatGPT Summary</h2>
  <button class="btn btn-chatgpt" id="btnSummarize">✨ Get Summary Prompt</button>
  <div id="status"></div>

  <div class="history-header">
    <span>History</span>
    <button class="history-clear" id="btnClearHistory">Clear</button>
  </div>
  <div id="historyList"><div class="history-empty">No transcripts yet</div></div>

  <script src="popup.js"></script>
</body>
</html>
