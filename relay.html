<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>YouTube Summary → ChatGPT</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }

    h1 { font-size: 20px; margin-bottom: 6px; }
    #videoTitle { color: #aaa; font-size: 14px; margin-bottom: 20px; }

    .buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }

    .btn-chatgpt { background: #10a37f; color: #fff; }
    .btn-copy    { background: #2a2a2a; color: #ccc; border: 1px solid #444; }

    #status {
      font-size: 13px;
      margin-bottom: 16px;
      color: #10a37f;
      min-height: 20px;
    }

    textarea {
      width: 100%;
      max-width: 820px;
      height: 420px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      color: #ddd;
      font-size: 13px;
      line-height: 1.6;
      padding: 16px;
      resize: vertical;
      outline: none;
    }
    textarea:focus { border-color: #10a37f; }

    .hint {
      margin-top: 12px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>🎬 YouTube Summary Prompt</h1>
  <div id="videoTitle">Loading...</div>

  <div class="buttons">
    <button class="btn btn-chatgpt" id="btnChatGPT">✨ Open ChatGPT</button>
    <button class="btn btn-copy"    id="btnCopy">📋 Copy prompt</button>
  </div>

  <div id="status"></div>
  <textarea id="promptBox" readonly></textarea>
  <p class="hint">After opening ChatGPT — press ⌘+V (Mac) or Ctrl+V (Windows) to paste</p>

  <script src="relay.js"></script>
</body>
</html>
